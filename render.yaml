services:
  - type: web
    name: smartdesk-ai
    runtime: python
    plan: free
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: INITIAL_USER_USERNAME
        value: user
      - key: INITIAL_USER_PASSWORD
        value: user123
      - key: INITIAL_USER_EMAIL
        value: user@example.com
