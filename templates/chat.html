{% extends "base.html" %}
{% from "_sidebar_profile.html" import sidebar_profile %}
{% block title %}Chat — SmartDesk AI{% endblock %}
{% block body %}
<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon-sm">
                <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#2563EB"/>
                    <path d="M8 20L14 14L18 18L24 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="24" cy="12" r="2" fill="white"/>
                </svg>
            </div>
            <span>SmartDesk AI</span>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('chat') }}" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                Chat Support
            </a>
            <a href="{{ url_for('tickets') }}" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                </svg>
                My Tickets
            </a>
            <a href="{{ url_for('submit_ticket') }}" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="16"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                Raise Ticket
            </a>
        </nav>

        {{ sidebar_profile() }}
    </aside>

    <!-- Chat Area -->
    <main class="chat-main">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="bot-avatar-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <rect x="3" y="11" width="18" height="10" rx="2"/>
                        <circle cx="12" cy="5" r="2"/>
                        <path d="M12 7v4"/>
                        <line x1="8" y1="16" x2="8" y2="16"/>
                        <line x1="16" y1="16" x2="16" y2="16"/>
                    </svg>
                </div>
                <div>
                    <h2>SmartDesk Assistant</h2>
                    <span class="online-badge">● Online</span>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Bot greeting injected by JS -->
        </div>

        <!-- Quick replies -->
        <div class="quick-replies" id="quickReplies">
            <button class="quick-reply-btn" onclick="sendQuickReply('Reset Password')">🔐 Reset Password</button>
            <button class="quick-reply-btn" onclick="sendQuickReply('Network Issue')">🌐 Network Issue</button>
            <button class="quick-reply-btn" onclick="sendQuickReply('Software Request')">💾 Software Request</button>
            <button class="quick-reply-btn" onclick="window.location.href='{{ url_for('submit_ticket') }}'">🎫 Raise Ticket</button>
        </div>

        <!-- Input area -->
        <div class="chat-input-area">
            <div class="chat-input-wrap">
                <input type="text" id="chatInput" placeholder="Type your IT issue here..." autocomplete="off">
                <button id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
